# ============================================================
# OpportunityScanner Docker Compose 配置
# 一键部署商机扫描器
# ============================================================

services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opportunity-scanner
    restart: unless-stopped
    
    # API Keys 通过环境变量注入
    environment:
      - NODE_ENV=production
      - SERPER_API_KEY=${SERPER_API_KEY}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # 可选：GitHub Token（用于创建 Issue）
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # 邮件服务配置
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TO=${SMTP_TO:-}
      # 定时执行间隔（秒），默认48小时=172800秒
      - SCAN_INTERVAL=${SCAN_INTERVAL:-172800}
    
    # 日志持久化挂载
    volumes:
      - ./logs:/app/logs
    
    # 日志输出配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    
    # 定时调度执行（两天一次）
    command: >
      sh -c "while true; do 
        npx tsx src/OpportunityHunter.ts; 
        echo '=========================================';
        echo '⏰ 扫描完成，等待48小时后再次执行...';
        echo '下次执行时间: $$(date -d '+48 hours' '+%Y-%m-%d %H:%M:%S')';
        echo '=========================================';
        sleep 172800; 
      done"
