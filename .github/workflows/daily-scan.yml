name: Opportunity Scanner Pro

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

env:
  # 强制显示 GitHub Actions 内部调试信息
  ACTIONS_STEP_DEBUG: true
  # 追踪 Node.js 未捕获的异常
  NODE_OPTIONS: '--unhandled-rejections=strict --trace-warnings --trace-uncaught'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          # 确保全局也有 tsx 以防 npx 路径问题
          npm install -g tsx 

      - name: Run Intelligence Scan
        # 2>&1 确保所有的错误都会被重定向到标准输出，防止被 GitHub 吞掉
        run: npm start 2>&1
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
