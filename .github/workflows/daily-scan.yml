name: Daily Opportunity Scan

on:
  # 每天两次触发 (北京时间 9:00 和 21:00)
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00
    - cron: '0 13 * * *'  # UTC 13:00 = 北京时间 21:00

  # 也支持手动触发
  workflow_dispatch:
    inputs:
      force_full_scan:
        description: '强制全量扫描 (忽略缓存)'
        required: false
        default: 'false'

# 允许 workflow 读取和写入
permissions:
  contents: write
  actions: read
  issues: write

jobs:
  scan-and-report:
    name: Scan Opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 编译 TypeScript
      - name: Build TypeScript
        run: npm run build

      # 5. 设置环境变量 (API Keys)
      - name: Configure API Keys
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" >> $GITHUB_ENV
          echo "DOUBAO_API_KEY=$DOUBAO_API_KEY" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=$GITHUB_TOKEN" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY" >> $GITHUB_ENV

      # 6. 运行扫描
      - name: Execute Opportunity Scanner
        run: npm start

      # 7. 获取最新报告
      - name: Find latest report
        id: report
        run: |
          REPORT=$(ls -t reports/*.md 2>/dev/null | head -1)
          echo "report=$REPORT" >> $GITHUB_OUTPUT
          echo "Found report: $REPORT"

      # 8. 提交报告到 GitHub (仅当有新报告时)
      - name: Commit and Push Report
        if: steps.report.outputs.report != ''
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add reports/
          # 只提交有变化的更改
          if git diff --staged --quiet; then
            echo "No new changes to commit"
          else
            git commit -m "📊 Update opportunity report - $(date +'%Y-%m-%d %H:%M')"
            git push || echo "Push skipped or failed"
          fi

      # 9. 失败时发送通知
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ 扫描任务失败，请检查日志"

  # 定期清理旧报告
  cleanup-old-reports:
    name: Cleanup Old Reports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 每周日凌晨清理一次
    schedule:
      - cron: '0 0 * * 0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove reports older than 30 days
        run: |
          find reports -type f -name "*.md" -mtime +30 -delete
          echo "已清理超过30天的旧报告"

      - name: Commit cleanup
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add -u
          if git diff --staged --quiet; then
            echo "No cleanup needed"
          else
            git commit -m "🧹 Cleanup old reports - $(date +'%Y-%m-%d')"
            git push || echo "Push skipped"
          fi
