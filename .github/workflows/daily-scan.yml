name: Opportunity Scanner Pro

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Runtime
        # 显式安装 tsx 确保运行环境绝对存在
        run: |
          npm install
          npm install -g tsx

      - name: Run Intelligence Scan
        # 2>&1 | tee output.log 强制将所有错误信息合并并打印到 stdout
        run: |
          stdbuf -oL -eL npx tsx OpportunityHunter.ts 2>&1 | tee runner.log
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
